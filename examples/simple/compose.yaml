services:
  minio:
    image: cgr.dev/chainguard/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 127.0.0.1:9000:9000
    command: ["server", "/data"]
    volumes:
      - minio-data:/data
  console:
    image: ghcr.io/huncrys/minio-console:latest
    build: ../..
    environment:
      CONSOLE_MINIO_REGION: eu-central-1
      CONSOLE_MINIO_SERVER: http://minio:9000
    ports:
      - 127.0.0.1:9090:9090

volumes:
  minio-data:
